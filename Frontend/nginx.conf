server {
    listen 80;

    location /api/ {
        # Use your PUBLIC backend URL here
        proxy_pass https://my-app-backend-0b3n.onrender.com;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host my-app-backend-0b3n.onrender.com; # Use the backend host
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important: Since we are hitting an HTTPS external URL, 
        # Nginx needs to handle the SSL handshake.
        proxy_ssl_server_name on;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}