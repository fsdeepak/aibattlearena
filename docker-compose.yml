services:
  my-app-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - ./backend/.env
    networks:
      - app-network

  my-app-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile 
      target: production
    ports:
      - "80:80"
    # --- ADD THIS SECTION ---
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # ------------------------
    depends_on:
      - my-app-backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge